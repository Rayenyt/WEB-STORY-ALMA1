<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Love Vision Infinity X Ultra 💖</title>

<link
href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet"
/>

<style>

/* =========================
RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Poppins',sans-serif;

overflow-x:hidden;

min-height:100vh;

background:
linear-gradient(
135deg,
#090015,
#13002e,
#22003c,
#32004f
);

background-size:400% 400%;

animation:bgMove 15s ease infinite;

color:white;

transition:.5s;
}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

/* =========================
LIGHT MODE
========================= */

body.light{

background:
linear-gradient(
135deg,
#fff0f7,
#ffffff,
#eef8ff
);

color:#111;
}

body.light .glass,
body.light .msg{

background:
rgba(255,255,255,.7);

color:#111;
}

body.light input,
body.light textarea{

background:
rgba(0,0,0,.05);

color:#111;
}

/* =========================
BACKGROUND PARTICLES
========================= */

.bg{

position:fixed;

inset:0;

overflow:hidden;

z-index:-1;
}

.bg span{

position:absolute;

width:5px;
height:5px;

border-radius:50%;

background:white;

opacity:.7;

animation:float linear infinite;
}

@keyframes float{

from{
transform:translateY(100vh);
}

to{
transform:translateY(-120vh);
}

}

/* =========================
TOP BAR
========================= */

.top-bar{

position:fixed;

top:20px;
right:20px;

display:flex;

gap:12px;

z-index:9999;
}

button{

padding:13px 22px;

border:none;

border-radius:20px;

cursor:pointer;

font-weight:700;

color:white;

background:
linear-gradient(
45deg,
#ff006e,
#8338ec
);

box-shadow:
0 0 25px rgba(255,0,110,.4);

transition:.3s;
}

button:hover{

transform:
translateY(-4px)
scale(1.05);

box-shadow:
0 0 40px rgba(255,0,110,.7);
}

.delete-btn{

background:
linear-gradient(
45deg,
#ff1744,
#b00020
);
}

/* =========================
MUSIC VISUALIZER
========================= */

.music-bars{

position:fixed;

top:20px;
left:20px;

display:flex;

gap:5px;

z-index:9999;
}

.music-bars span{

width:6px;

height:20px;

border-radius:20px;

background:
linear-gradient(#ff006e,#8338ec);

animation:bars 1s infinite ease-in-out;
}

.music-bars span:nth-child(2){
animation-delay:.2s;
}

.music-bars span:nth-child(3){
animation-delay:.4s;
}

.music-bars span:nth-child(4){
animation-delay:.6s;
}

.music-bars span:nth-child(5){
animation-delay:.8s;
}

@keyframes bars{

0%{
height:15px;
}

50%{
height:45px;
}

100%{
height:15px;
}

}

/* =========================
HERO
========================= */

.hero{

padding-top:130px;

text-align:center;
}

.hero h1{

font-size:95px;

font-family:'Great Vibes',cursive;

color:#ffb6dd;

text-shadow:
0 0 25px rgba(255,0,110,.8);
}

.hero p{

margin-top:10px;

font-size:20px;

opacity:.9;
}

.main-heart{

font-size:150px;

animation:pulse 1.5s infinite;

cursor:pointer;

margin-bottom:20px;

text-shadow:
0 0 40px #ff2d75;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.2);
}

100%{
transform:scale(1);
}

}

/* =========================
CARDS
========================= */

.cards{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:40px;

margin-top:70px;
}

.card{

width:320px;

border-radius:35px;

overflow:hidden;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border:
1px solid rgba(255,255,255,.1);

text-align:center;

transition:.4s;
}

.card:hover{

transform:
translateY(-10px)
scale(1.02);
}

.card-top{

height:160px;

background:
linear-gradient(
135deg,
#ff006e,
#8338ec
);
}

.card img{

width:160px;
height:160px;

border-radius:50%;

object-fit:cover;

margin-top:-80px;

border:
5px solid rgba(255,255,255,.3);
}

.card h2{

margin-top:15px;

font-size:32px;
}

.card p{

padding:15px 25px;
}

.badge{

display:inline-block;

margin-bottom:25px;

padding:12px 20px;

border-radius:30px;

background:
linear-gradient(
45deg,
#ff006e,
#ff4da6
);
}

/* =========================
SECTIONS
========================= */

.section{

width:92%;

max-width:1000px;

margin:80px auto;
}

.glass{

background:
rgba(255,255,255,.07);

backdrop-filter:blur(18px);

padding:35px;

border-radius:35px;

border:
1px solid rgba(255,255,255,.1);

box-shadow:
0 0 30px rgba(255,0,110,.15);
}

.section h2{

text-align:center;

margin-bottom:30px;

font-size:40px;
}

/* =========================
TIMER
========================= */

.timer-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(140px,1fr));

gap:20px;
}

.timer-box{

padding:25px;

border-radius:25px;

background:
rgba(255,255,255,.08);

text-align:center;
}

.timer-box span{

font-size:45px;

font-weight:700;
}

/* =========================
GALLERY
========================= */

.gallery{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;
}

.gallery img{

width:100%;

height:250px;

object-fit:cover;

border-radius:25px;

transition:.4s;

cursor:pointer;
}

.gallery img:hover{

transform:
scale(1.05);

box-shadow:
0 0 35px rgba(255,0,110,.5);
}

/* =========================
INPUTS
========================= */

input,
textarea{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:18px;

background:
rgba(255,255,255,.08);

color:white;

font-size:15px;

outline:none;
}

textarea{

height:140px;

resize:none;
}

input:focus,
textarea:focus{

box-shadow:
0 0 20px rgba(255,0,110,.4);
}

/* =========================
MESSAGES
========================= */

.msg{

margin-top:20px;

padding:25px;

border-radius:28px;

background:
rgba(255,255,255,.07);

border:
1px solid rgba(255,255,255,.08);

animation:show .4s ease;
}

@keyframes show{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.user-tag{

display:inline-block;

padding:8px 15px;

border-radius:30px;

background:#ff006e;

font-size:12px;

font-weight:700;

margin-bottom:15px;
}

.msg-actions{

display:flex;

gap:12px;

margin-top:20px;

flex-wrap:wrap;
}

/* =========================
TOAST
========================= */

#toast{

position:fixed;

bottom:30px;

left:50%;

transform:translateX(-50%);

background:
rgba(0,0,0,.8);

padding:12px 20px;

border-radius:20px;

z-index:999999;

opacity:0;

transition:.3s;
}

/* =========================
MODAL
========================= */

.modal{

position:fixed;

inset:0;

display:none;

justify-content:center;
align-items:center;

background:
rgba(0,0,0,.9);

z-index:99999;
}

.modal img{

width:85%;

max-width:450px;

border-radius:25px;
}

/* =========================
FOOTER
========================= */

.footer{

margin:70px 0 40px;

text-align:center;

opacity:.8;
}

/* =========================
RESPONSIVE
========================= */

@media(max-width:900px){

.hero h1{

font-size:70px;
}

.main-heart{

font-size:120px;
}

}

</style>

</head>

<body>

<div class="music-bars">

<span></span>
<span></span>
<span></span>
<span></span>
<span></span>

</div>

<div class="top-bar">

<button onclick="toggleMode()">
🌗 Mode
</button>

<button onclick="toggleMusic()">
🎵 Music
</button>

</div>

<div class="bg" id="bg"></div>

<div class="hero">

<div
class="main-heart"
onclick="heartExplosion(event)"
>
❤️
</div>

<h1>
Rayen & Alma
</h1>

<p>
Two Souls • One Endless Love
</p>

</div>

<div class="cards">

<div class="card">

<div class="card-top"></div>

<img src="https://files.catbox.moe/f7x9f6.jpg"/>

<h2>Rayen</h2>

<p>
My heart belongs to Alma forever.
</p>

<div class="badge">
Forever Mine ❤️
</div>

</div>

<div class="card">

<div class="card-top"></div>

<img src="https://files.catbox.moe/xvqhco.jpg"/>

<h2>Alma</h2>

<p>
The queen of my universe ✨
</p>

<div class="badge">
Soul Mate 💖
</div>

</div>

</div>

<div class="section">

<div class="glass">

<h2>
⏳ Love Timer
</h2>

<div class="timer-grid">

<div class="timer-box">
<span id="days">0</span>
<p>Days</p>
</div>

<div class="timer-box">
<span id="hours">0</span>
<p>Hours</p>
</div>

<div class="timer-box">
<span id="minutes">0</span>
<p>Minutes</p>
</div>

<div class="timer-box">
<span id="seconds">0</span>
<p>Seconds</p>
</div>

</div>

</div>

</div>

<div class="section">

<div class="glass">

<h2>
📸 Memories Gallery
</h2>

<div class="gallery">

<img
src="https://files.catbox.moe/f7x9f6.jpg"
onclick="openImg(this.src)"
/>

<img
src="https://files.catbox.moe/xvqhco.jpg"
onclick="openImg(this.src)"
/>

</div>

</div>

</div>

<div class="section">

<div class="glass">

<h2>
💌 Love Messages
</h2>

<input
id="username"
placeholder="Your name..."
/>

<input
id="title"
placeholder="Message title..."
/>

<textarea
id="text"
placeholder="Write your message..."
></textarea>

<div style="margin-top:20px;">

<button onclick="addMsg()">
Send ❤️
</button>

</div>

<div id="messages"></div>

</div>

</div>

<div class="footer">

Made with ❤️ by Rayen & Alma

</div>

<div
class="modal"
id="modal"
onclick="closeImg()"
>

<img id="modalImg"/>

</div>

<div id="toast"></div>

<script>

/* =========================
BACKGROUND PARTICLES
========================= */

const bg =
document.getElementById("bg");

for(let i=0;i<220;i++){

const s =
document.createElement("span");

s.style.left =
Math.random()*100+"%";

s.style.animationDuration =
(Math.random()*10+5)+"s";

s.style.opacity =
Math.random();

bg.appendChild(s);

}

/* =========================
MODE SAVE
========================= */

const savedTheme =
localStorage.getItem("theme");

if(savedTheme === "light"){

document.body.classList.add("light");

}

function toggleMode(){

document.body.classList.toggle("light");

if(document.body.classList.contains("light")){

localStorage.setItem("theme","light");

}else{

localStorage.setItem("theme","dark");

}

}

window.toggleMode =
toggleMode;

/* =========================
MUSIC
========================= */

const music =
new Audio(
"https://files.catbox.moe/lhfn3i.mp3"
);

music.loop = true;

let playing = false;

function toggleMusic(){

playing = !playing;

if(playing){

music.play();

}else{

music.pause();

}

}

window.toggleMusic =
toggleMusic;

/* =========================
TOAST
========================= */

function showToast(msg){

const t =
document.getElementById("toast");

t.innerText = msg;

t.style.opacity = "1";

setTimeout(()=>{

t.style.opacity = "0";

},1500);

}

/* =========================
HEART EXPLOSION
========================= */

function heartExplosion(e){

for(let i=0;i<15;i++){

const heart =
document.createElement("div");

heart.innerHTML = "❤️";

heart.style.position = "fixed";

heart.style.left =
e.clientX+"px";

heart.style.top =
e.clientY+"px";

heart.style.fontSize =
(Math.random()*25+15)+"px";

heart.style.pointerEvents =
"none";

heart.style.transition =
"1s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.style.transform =
`translate(
${(Math.random()-0.5)*400}px,
-${Math.random()*350}px
)
scale(0)`;

heart.style.opacity = "0";

},10);

setTimeout(()=>{

heart.remove();

},1000);

}

}

window.heartExplosion =
heartExplosion;

/* =========================
IMAGE MODAL
========================= */

function openImg(src){

document
.getElementById("modal")
.style.display = "flex";

document
.getElementById("modalImg")
.src = src;

}

window.openImg =
openImg;

function closeImg(){

document
.getElementById("modal")
.style.display = "none";

}

window.closeImg =
closeImg;

</script>

<script type="module">

import { createClient }
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

/* =========================
SUPABASE
========================= */

const supabaseUrl =
"https://vjsphepnycchogektxcq.supabase.co";

const supabaseKey =
"sb_publishable_TzMnSWGJWmQF190_x9Fxfg_2tbr1gnX";

const supabase =
createClient(
supabaseUrl,
supabaseKey
);

/* =========================
USER ID
========================= */

let userId =
localStorage.getItem("loveUserId");

if(!userId){

userId =
crypto.randomUUID();

localStorage.setItem(
"loveUserId",
userId
);

}

/* =========================
LOVE TIMER
========================= */

let startTime =
localStorage.getItem("loveStartTime");

if(!startTime){

startTime = Date.now();

localStorage.setItem(
"loveStartTime",
startTime
);

}else{

startTime =
parseInt(startTime);

}

function updateTimer(){

const now =
Date.now();

const diff =
now - startTime;

const d =
Math.floor(diff/(1000*60*60*24));

const h =
Math.floor((diff/(1000*60*60))%24);

const m =
Math.floor((diff/(1000*60))%60);

const s =
Math.floor((diff/1000)%60);

document.getElementById("days").innerText = d;
document.getElementById("hours").innerText = h;
document.getElementById("minutes").innerText = m;
document.getElementById("seconds").innerText = s;

}

setInterval(updateTimer,1000);

updateTimer();

/* =========================
COPY
========================= */

async function copyText(text){

await navigator.clipboard.writeText(text);

showToast("Copied ❤️");

}

window.copyText =
copyText;

/* =========================
LOAD MESSAGES
========================= */

async function loadMessages(){

const container =
document.getElementById("messages");

const { data , error } =
await supabase
.from("love_messages")
.select("*")
.order("id",{
ascending:false
});

if(error){

console.log(error);

return;

}

container.innerHTML = "";

if(data.length === 0){

container.innerHTML =
`
<div class="msg">
No messages yet ❤️
</div>
`;

return;

}

data.forEach((msg)=>{

const isMine =
msg.user_id === userId;

const div =
document.createElement("div");

div.className = "msg";

div.innerHTML = `

<div class="user-tag">

${msg.username || "Anonymous"}

</div>

<h3>

${msg.title}

</h3>

<br>

<p>

${msg.text}

</p>

<br>

<small>

${new Date(msg.created_at)
.toLocaleString()}

</small>

<div class="msg-actions">

<button onclick='copyText(${JSON.stringify(msg.text)})'>
📋 Copy
</button>

${
isMine
?
`
<button
class="delete-btn"
onclick="deleteMessage(${msg.id})">
🗑 Delete
</button>
`
:
""
}

</div>

`;

container.appendChild(div);

});

}

window.loadMessages =
loadMessages;

/* =========================
ADD MESSAGE
========================= */

async function addMsg(){

let username =
document
.getElementById("username")
.value
.trim();

const title =
document
.getElementById("title")
.value
.trim() || "Love Message ❤️";

const text =
document
.getElementById("text")
.value
.trim();

if(!username){

username = "Anonymous";

}

if(!text){

showToast("Write a message ❤️");

return;

}

const { error } =
await supabase
.from("love_messages")
.insert([{

username,
title,
text,
user_id:userId

}]);

if(error){

console.log(error);

showToast("Error saving");

return;

}

document.getElementById("username").value = "";
document.getElementById("title").value = "";
document.getElementById("text").value = "";

showToast("Message Sent ❤️");

loadMessages();

}

window.addMsg =
addMsg;

/* =========================
DELETE MESSAGE
========================= */

async function deleteMessage(id){

const ask =
confirm("Delete this message?");

if(!ask) return;

await supabase
.from("love_messages")
.delete()
.eq("id",id)
.eq("user_id",userId);

showToast("Deleted 🗑");

loadMessages();

}

window.deleteMessage =
deleteMessage;

/* =========================
REALTIME
========================= */

supabase
.channel("love-room")

.on(
"postgres_changes",
{
event:"*",
schema:"public",
table:"love_messages"
},
()=>{

loadMessages();

}
)

.subscribe();

/* =========================
START
========================= */

loadMessages();

</script>

</body>

</html>
